version: "1"

router:
  agent_id: router
  name: Router
  description: >-
    Main conversational agent. Handles chat, decides when to delegate tasks
    to specialized sub-agents.
  model: "anthropic:claude-sonnet-4-20250514"
  model_tier: fast
  triggers: []
  timeout_seconds: 60
  enabled: true

agents:
  - agent_id: coder
    name: Coder
    description: >-
      Code generation and analysis. Writes tools, pages, tests, and handles
      complex programming tasks.
    model: "anthropic:claude-sonnet-4-20250514"
    model_tier: heavy
    output_type: code_artifact
    triggers:
      - "write code"
      - "generate a tool"
      - "create a page"
      - "fix this bug"
      - "review this code"
    timeout_seconds: 300
    affinity: any
    required_capabilities:
      - api
    content_rating: sfw
    enabled: true

  - agent_id: researcher
    name: Researcher
    description: >-
      Web research and information gathering. Searches the web, summarizes
      findings, and provides sourced answers.
    model: "anthropic:claude-sonnet-4-20250514"
    model_tier: fast
    output_type: research_result
    triggers:
      - "search for"
      - "look up"
      - "research"
      - "find information"
    timeout_seconds: 120
    affinity: any
    required_capabilities:
      - api
    content_rating: sfw
    enabled: true

  - agent_id: sysadmin
    name: SysAdmin
    description: >-
      System administration tasks. Executes SSH commands, reads and writes
      files on remote machines across the Tailnet.
    model: "anthropic:claude-sonnet-4-20250514"
    model_tier: balanced
    output_type: command_result
    triggers:
      - "run command"
      - "check server"
      - "deploy"
      - "ssh"
    timeout_seconds: 180
    affinity: preferred
    required_capabilities:
      - tailnet
    content_rating: sfw
    enabled: true

  - agent_id: spicy
    name: Spicy
    description: >-
      Uncensored local model for content that cloud providers won't handle.
      Runs exclusively on the local GPU node via Ollama.
    model: "ollama:dolphin-mixtral"
    model_tier: local
    output_type: text
    triggers:
      - "nsfw"
      - "uncensored"
    timeout_seconds: 300
    affinity: exclusive
    required_capabilities:
      - local
      - gpu
    content_rating: nsfw
    enabled: false
