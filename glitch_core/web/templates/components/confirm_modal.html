<div class="bg-glitch-surface border border-glitch-border rounded-glitch p-6 shadow-xl">
    <h3 class="text-lg font-semibold text-glitch-text mb-2">{{ title | default("Confirm Action") }}</h3>
    <p class="text-glitch-muted text-sm mb-4">{{ message | default("Are you sure you want to proceed?") }}</p>
    <div class="flex gap-3 justify-end">
        <button onclick="document.getElementById('modal-container').classList.add('hidden')"
                class="px-4 py-2 text-sm rounded-glitch border border-glitch-border text-glitch-muted hover:bg-glitch-border/50 transition-colors">
            Cancel
        </button>
        <button hx-post="{{ confirm_url }}"
                hx-target="{{ confirm_target | default('body') }}"
                hx-swap="{{ confirm_swap | default('outerHTML') }}"
                onclick="document.getElementById('modal-container').classList.add('hidden')"
                class="px-4 py-2 text-sm rounded-glitch bg-glitch-error text-white hover:opacity-90 transition-opacity">
            {{ confirm_label | default("Confirm") }}
        </button>
    </div>
</div>
