<div class="bg-glitch-surface border border-glitch-border rounded-glitch p-6 shadow-xl">
    <h3 class="text-lg font-semibold text-glitch-text mb-4">Choose Theme</h3>

    <div class="grid grid-cols-1 gap-3">
        {% for preset_name, preset in presets.items() %}
        <button hx-post="/theme/apply"
                hx-vals='{"theme_name": "{{ preset_name }}"}'
                hx-headers='{"HX-Refresh": "true"}'
                class="flex items-center gap-3 p-3 rounded-glitch border border-glitch-border hover:border-glitch-accent/50 transition-colors text-left">
            <!-- Color Swatches -->
            <div class="flex gap-1 shrink-0">
                <div class="w-5 h-5 rounded-full border border-white/10" style="background-color: {{ preset.colors.bg }}"></div>
                <div class="w-5 h-5 rounded-full border border-white/10" style="background-color: {{ preset.colors.accent }}"></div>
                <div class="w-5 h-5 rounded-full border border-white/10" style="background-color: {{ preset.colors.surface }}"></div>
            </div>

            <div class="flex-1">
                <div class="text-sm font-medium text-glitch-text">{{ preset.display_name }}</div>
                <div class="text-xs text-glitch-muted">{{ preset.font_family.split(',')[0] }}</div>
            </div>

            {% if theme.name == preset_name %}
            <span class="text-xs text-glitch-accent">Active</span>
            {% endif %}
        </button>
        {% endfor %}
    </div>

    <!-- AI Generation Stub -->
    <div class="mt-4 pt-4 border-t border-glitch-border">
        <p class="text-xs text-glitch-muted mb-2">AI Theme Generation</p>
        <form hx-post="/theme/generate" hx-target="#picker-gen-result" hx-swap="innerHTML" hx-indicator="#picker-gen-spinner">
            <div class="flex gap-2">
                <input type="text" name="prompt" placeholder="e.g. 'soft pink and cozy'"
                       class="flex-1 bg-glitch-bg border border-glitch-border rounded-glitch px-3 py-1.5 text-sm text-glitch-text"
                       required>
                <button type="submit" class="px-3 py-1.5 text-sm rounded-glitch bg-glitch-accent text-white hover:opacity-90 transition-opacity">
                    Generate
                </button>
            </div>
        </form>
        <div id="picker-gen-spinner" class="htmx-indicator text-xs text-glitch-muted mt-1">Generating...</div>
        <div id="picker-gen-result" class="mt-1"></div>
    </div>

    <div class="mt-4 flex justify-end">
        <button onclick="document.getElementById('modal-container').classList.add('hidden')"
                class="px-4 py-2 text-sm rounded-glitch border border-glitch-border text-glitch-muted hover:bg-glitch-border/50 transition-colors">
            Close
        </button>
    </div>
</div>
