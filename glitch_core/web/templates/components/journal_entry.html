<div class="flex gap-3 group">
    <!-- Timeline dot -->
    <div class="flex flex-col items-center shrink-0">
        <div class="w-2 h-2 rounded-full bg-glitch-accent mt-2"></div>
        <div class="w-px flex-1 bg-glitch-border group-last:hidden"></div>
    </div>

    <!-- Entry content -->
    <div class="pb-4 flex-1 min-w-0">
        <div class="flex items-center gap-2 mb-1">
            {% if entry.topic %}
            <span class="text-xs font-medium px-2 py-0.5 rounded-full bg-glitch-accent/20 text-glitch-accent">
                {{ entry.topic }}
            </span>
            {% endif %}
            <span class="text-xs text-glitch-muted">{{ entry.created_at }}</span>
            {% if entry.archived %}
            <span class="text-xs text-glitch-muted italic">(archived)</span>
            {% endif %}
        </div>
        <p class="text-sm text-glitch-text leading-relaxed">{{ entry.content }}</p>
        <div class="mt-1 flex items-center gap-2">
            <div class="h-1 w-16 bg-glitch-border rounded-full overflow-hidden">
                <div class="h-full bg-glitch-accent/60 rounded-full" style="width: {{ (entry.importance * 100)|int }}%"></div>
            </div>
            <span class="text-xs text-glitch-muted">importance</span>
        </div>
    </div>
</div>
