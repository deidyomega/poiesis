<div id="memory-{{ memory.memory_id }}" class="bg-glitch-surface border border-glitch-accent/50 rounded-glitch p-4">
    <form hx-post="/memories/{{ memory.memory_id }}/update"
          hx-target="#memory-{{ memory.memory_id }}"
          hx-swap="outerHTML">
        <div class="space-y-3">
            <!-- Category Select -->
            <div>
                <label class="block text-xs text-glitch-muted mb-1">Category</label>
                <select name="category" class="w-full bg-glitch-bg border border-glitch-border rounded-glitch px-3 py-1.5 text-sm text-glitch-text focus:outline-none focus:border-glitch-accent">
                    {% for cat in ["identity", "relationship", "preference", "fact", "skill", "medical", "work", "hobby", "other"] %}
                    <option value="{{ cat }}" {% if memory.category == cat %}selected{% endif %}>{{ cat|title }}</option>
                    {% endfor %}
                </select>
            </div>

            <!-- Content Textarea -->
            <div>
                <label class="block text-xs text-glitch-muted mb-1">Content</label>
                <textarea name="content" rows="4"
                          class="w-full bg-glitch-bg border border-glitch-border rounded-glitch px-3 py-2 text-sm text-glitch-text focus:outline-none focus:border-glitch-accent resize-y">{{ memory.content }}</textarea>
            </div>

            <!-- Previous Content (if exists) -->
            {% if memory.previous_content %}
            <div class="bg-glitch-bg border border-glitch-border rounded-glitch p-3">
                <div class="text-xs text-glitch-muted mb-1">Previous version:</div>
                <p class="text-xs text-glitch-muted italic">{{ memory.previous_content }}</p>
            </div>
            {% endif %}

            <!-- Source Journals -->
            {% if memory.source_journals %}
            <div>
                <div class="text-xs text-glitch-muted mb-1">Source journals: {{ memory.source_journals|length }}</div>
            </div>
            {% endif %}

            <!-- Actions -->
            <div class="flex gap-2 justify-end pt-1">
                <button type="button"
                        hx-get="/memories/{{ memory.memory_id }}/card"
                        hx-target="#memory-{{ memory.memory_id }}"
                        hx-swap="outerHTML"
                        class="px-3 py-1.5 text-sm rounded-glitch border border-glitch-border text-glitch-muted hover:bg-glitch-border/50 transition-colors">
                    Cancel
                </button>
                <button hx-post="/memories/{{ memory.memory_id }}/delete"
                        hx-target="#memory-{{ memory.memory_id }}"
                        hx-swap="outerHTML"
                        hx-confirm="Soft-delete this memory?"
                        type="button"
                        class="px-3 py-1.5 text-sm rounded-glitch bg-glitch-error/20 text-glitch-error hover:bg-glitch-error/30 transition-colors">
                    Delete
                </button>
                <button type="submit"
                        class="px-3 py-1.5 text-sm rounded-glitch bg-glitch-accent text-white hover:opacity-90 transition-opacity">
                    Save
                </button>
            </div>
        </div>
    </form>
</div>
