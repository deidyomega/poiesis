{% extends "base.html" %}

{% block title %}ComfyUI Image Generator{% endblock %}

{% block content %}
<style>
    .generation-form {
        max-width: 800px;
        margin: 20px auto;
        padding: 20px;
        background: #f8f9fa;
        border-radius: 8px;
    }
    .form-group {
        margin-bottom: 15px;
    }
    .form-control {
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 4px;
        font-size: 16px;
    }
    textarea.form-control {
        min-height: 100px;
        resize: vertical;
    }
    .btn-generate {
        background-color: #007bff;
        color: white;
        padding: 12px 24px;
        border: none;
        border-radius: 4px;
        font-size: 16px;
        cursor: pointer;
        width: 100%;
        margin-top: 10px;
    }
    .btn-generate:hover {
        background-color: #0056b3;
    }
    .btn-generate:disabled {
        background-color: #6c757d;
        cursor: not-allowed;
    }
    .status {
        margin: 20px 0;
        padding: 10px;
        border-radius: 4px;
        text-align: center;
    }
    .status.online {
        background-color: #d4edda;
        color: #155724;
    }
    .status.offline {
        background-color: #f8d7da;
        color: #721c24;
    }
    .result-container {
        margin-top: 30px;
        text-align: center;
    }
    .generated-image {
        max-width: 100%;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .loading {
        display: none;
        text-align: center;
        margin: 20px 0;
    }
    .spinner {
        display: inline-block;
        width: 40px;
        height: 40px;
        border: 4px solid #f3f3f3;
        border-top: 4px solid #007bff;
        border-radius: 50%;
        animation: spin 1s linear infinite;
    }
    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }
    .error-message {
        background-color: #f8d7da;
        color: #721c24;
        padding: 15px;
        border-radius: 4px;
        margin-top: 20px;
    }
    .slider-container {
        display: flex;
        align-items: center;
        gap: 10px;
    }
    .slider {
        flex: 1;
    }
    .slider-value {
        min-width: 50px;
        text-align: right;
        font-weight: bold;
    }
</style>

<h1>ComfyUI Image Generator</h1>

<div id="server-status" class="status">
    Checking server status...
</div>

<div class="generation-form">
    <form id="generation-form">
        <div class="form-group">
            <label for="prompt">Prompt:</label>
            <textarea 
                id="prompt" 
                name="prompt" 
                class="form-control" 
                placeholder="A majestic mountain landscape with snow-capped peaks..."
                required
            ></textarea>
        </div>
        
        <div class="form-group">
            <label for="negative_prompt">Negative Prompt (optional):</label>
            <textarea 
                id="negative_prompt" 
                name="negative_prompt" 
                class="form-control" 
                placeholder="blurry, low quality, distorted..."
            ></textarea>
        </div>
        
        <div class="form-group">
            <label for="steps">Steps:</label>
            <div class="slider-container">
                <input 
                    type="range" 
                    id="steps" 
                    name="steps" 
                    min="1" 
                    max="150" 
                    value="20" 
                    class="slider"
                >
                <span class="slider-value" id="steps-value">20</span>
            </div>
        </div>
        
        <div class="form-group">
            <label for="cfg_scale">CFG Scale:</label>
            <div class="slider-container">
                <input 
                    type="range" 
                    id="cfg_scale" 
                    name="cfg_scale" 
                    min="1" 
                    max="20" 
                    value="8" 
                    step="0.5"
                    class="slider"
                >
                <span class="slider-value" id="cfg-value">8</span>
            </div>
        </div>
        
        <button type="submit" class="btn-generate" id="generate-btn">
            Generate Image
        </button>
    </form>
</div>

<div class="loading" id="loading">
    <div class="spinner"></div>
    <p>Generating your image...</p>
</div>

<div id="error-container"></div>
<div id="result-container" class="result-container"></div>

<script>
// Check server status on load
async function checkServerStatus() {
    try {
        const response = await fetch('/comfyui/status');
        const data = await response.json();
        const statusElement = document.getElementById('server-status');
        
        if (data.status === 'online') {
            statusElement.className = 'status online';
            statusElement.textContent = '✓ ComfyUI Server Online';
            document.getElementById('generate-btn').disabled = false;
        } else {
            statusElement.className = 'status offline';
            statusElement.textContent = '✗ ComfyUI Server Offline: ' + data.error;
            document.getElementById('generate-btn').disabled = true;
        }
    } catch (error) {
        document.getElementById('server-status').className = 'status offline';
        document.getElementById('server-status').textContent = '✗ Failed to check server status';
        document.getElementById('generate-btn').disabled = true;
    }
}

// Update slider values
document.getElementById('steps').addEventListener('input', function(e) {
    document.getElementById('steps-value').textContent = e.target.value;
});

document.getElementById('cfg_scale').addEventListener('input', function(e) {
    document.getElementById('cfg-value').textContent = e.target.value;
});

// Handle form submission
document.getElementById('generation-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const formData = new FormData(e.target);
    const data = {
        prompt: formData.get('prompt'),
        negative_prompt: formData.get('negative_prompt'),
        steps: parseInt(formData.get('steps')),
        cfg_scale: parseFloat(formData.get('cfg_scale'))
    };
    
    // Clear previous results
    document.getElementById('error-container').innerHTML = '';
    document.getElementById('result-container').innerHTML = '';
    
    // Show loading
    document.getElementById('loading').style.display = 'block';
    document.getElementById('generate-btn').disabled = true;
    
    try {
        const response = await fetch('/comfyui/generate', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(data)
        });
        
        const result = await response.json();
        
        if (result.status === 'success') {
            document.getElementById('result-container').innerHTML = `
                <h2>Generated Image</h2>
                <img src="${result.image}" alt="Generated image" class="generated-image">
                <p><small>Prompt ID: ${result.prompt_id}</small></p>
            `;
        } else {
            document.getElementById('error-container').innerHTML = `
                <div class="error-message">
                    <strong>Error:</strong> ${result.error || 'Unknown error occurred'}
                </div>
            `;
        }
    } catch (error) {
        document.getElementById('error-container').innerHTML = `
            <div class="error-message">
                <strong>Error:</strong> ${error.message}
            </div>
        `;
    } finally {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('generate-btn').disabled = false;
    }
});

// Check status on page load
checkServerStatus();
// Recheck every 30 seconds
setInterval(checkServerStatus, 30000);
</script>
{% endblock %}
