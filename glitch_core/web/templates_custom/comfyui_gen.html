{% extends "base.html" %}

{% block title %}ComfyUI Image Generator{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto p-6">
    <h1 class="text-3xl font-bold mb-6">Image Generation</h1>
    
    <!-- Status indicator -->
    <div id="status" class="mb-4 p-3 rounded-lg bg-gray-100">
        <span class="font-semibold">ComfyUI Status:</span>
        <span id="status-text" class="ml-2">Checking...</span>
    </div>
    
    <!-- Generation Form -->
    <form id="gen-form" class="space-y-4 mb-6">
        <div>
            <label for="prompt" class="block text-sm font-medium mb-2">Prompt</label>
            <textarea 
                id="prompt" 
                name="prompt" 
                rows="3" 
                class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500"
                placeholder="A majestic mountain landscape at sunset..."
                required
            ></textarea>
        </div>
        
        <div>
            <label for="negative_prompt" class="block text-sm font-medium mb-2">Negative Prompt</label>
            <textarea 
                id="negative_prompt" 
                name="negative_prompt" 
                rows="2" 
                class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500"
                placeholder="blurry, bad quality, watermark..."
            ></textarea>
        </div>
        
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label for="steps" class="block text-sm font-medium mb-2">Steps</label>
                <input 
                    type="number" 
                    id="steps" 
                    name="steps" 
                    value="20" 
                    min="1" 
                    max="150"
                    class="w-full p-2 border rounded-lg"
                >
            </div>
            <div>
                <label for="cfg" class="block text-sm font-medium mb-2">CFG Scale</label>
                <input 
                    type="number" 
                    id="cfg" 
                    name="cfg" 
                    value="7.0" 
                    min="1" 
                    max="20" 
                    step="0.5"
                    class="w-full p-2 border rounded-lg"
                >
            </div>
        </div>
        
        <button 
            type="submit" 
            id="generate-btn"
            class="w-full bg-blue-600 text-white py-3 px-6 rounded-lg hover:bg-blue-700 disabled:bg-gray-400 disabled:cursor-not-allowed transition-colors"
        >
            Generate Image
        </button>
    </form>
    
    <!-- Loading indicator -->
    <div id="loading" class="hidden text-center py-8">
        <div class="inline-flex items-center">
            <svg class="animate-spin h-8 w-8 text-blue-600 mr-3" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <span class="text-lg">Generating your image...</span>
        </div>
    </div>
    
    <!-- Result display -->
    <div id="result" class="hidden">
        <h2 class="text-xl font-semibold mb-4">Generated Image</h2>
        <div class="bg-gray-100 rounded-lg p-4">
            <img id="generated-image" class="mx-auto max-w-full rounded-lg shadow-lg">
        </div>
    </div>
    
    <!-- Error display -->
    <div id="error" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-lg">
        <span id="error-text"></span>
    </div>
</div>

<script>
// Check ComfyUI status on load
async function checkStatus() {
    try {
        const response = await fetch('/comfyui/status');
        const data = await response.json();
        const statusEl = document.getElementById('status');
        const statusText = document.getElementById('status-text');
        const generateBtn = document.getElementById('generate-btn');
        
        if (data.online) {
            statusText.textContent = 'Online';
            statusEl.className = 'mb-4 p-3 rounded-lg bg-green-100 text-green-800';
            generateBtn.disabled = false;
        } else {
            statusText.textContent = 'Offline';
            statusEl.className = 'mb-4 p-3 rounded-lg bg-red-100 text-red-800';
            generateBtn.disabled = true;
        }
    } catch (error) {
        document.getElementById('status-text').textContent = 'Error checking status';
    }
}

// Handle form submission
document.getElementById('gen-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const formData = new FormData(e.target);
    const loading = document.getElementById('loading');
    const result = document.getElementById('result');
    const error = document.getElementById('error');
    const generateBtn = document.getElementById('generate-btn');
    
    // Hide previous results/errors
    result.classList.add('hidden');
    error.classList.add('hidden');
    
    // Show loading
    loading.classList.remove('hidden');
    generateBtn.disabled = true;
    
    try {
        const response = await fetch('/comfyui/generate', {
            method: 'POST',
            body: formData
        });
        
        const data = await response.json();
        
        if (response.ok && data.success) {
            // Show generated image
            document.getElementById('generated-image').src = data.image;
            result.classList.remove('hidden');
        } else {
            // Show error
            document.getElementById('error-text').textContent = data.error || 'Generation failed';
            error.classList.remove('hidden');
        }
    } catch (err) {
        document.getElementById('error-text').textContent = 'Network error: ' + err.message;
        error.classList.remove('hidden');
    } finally {
        loading.classList.add('hidden');
        generateBtn.disabled = false;
    }
});

// Check status on page load
checkStatus();
// Recheck every 30 seconds
setInterval(checkStatus, 30000);
</script>
{% endblock %}
